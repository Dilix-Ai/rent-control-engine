name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit -p tsconfig.json

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify dual build output
        run: |
          test -f dist/esm/index.js
          test -f dist/esm/index.d.ts
          test -f dist/esm/resolver.js
          test -f dist/esm/ordinances.js
          test -f dist/cjs/index.js
          test -f dist/cjs/resolver.js
          test -f dist/cjs/ordinances.js
          test -f dist/cjs/package.json

      - name: Smoke-test ESM and CJS entry points
        run: |
          node -e "import('./dist/esm/index.js').then(m => { if (typeof m.resolveRentCap !== 'function') throw new Error('ESM export broken'); console.log('ESM OK'); })"
          node -e "const m = require('./dist/cjs/index.js'); if (typeof m.resolveRentCap !== 'function') throw new Error('CJS export broken'); console.log('CJS OK');"
